<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校園外送｜菜單</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top">校園外送</a>
      <nav aria-label="主要導覽">
        <a href="#menu">菜單</a>
        <a href="#promotion">優惠</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">今日推薦</p>
        <h1 id="page-title">蜂蜜檸檬紅茶</h1>
      </section>

      <section id="promotion" class="promotion" aria-label="促銷資訊">
        <strong>優惠資訊：</strong>
        <span>首次使用校園外送，立即享受便利服務。</span>
      </section>

      <section id="menu" aria-labelledby="menu-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">限定菜單</p>
            <h2 id="menu-title">飲品與小點</h2>
          </div>
          <p>營業時間：11:00–20:00</p>
        </div>

        <div class="menu-grid">
          <article class="menu-item">
            <h3>蜂蜜檸檬紅茶</h3>
            <p>檸檬、紅茶、蜂蜜</p>
            <div class="item-footer">
              <strong>NT$ 55</strong>
              <button type="button" data-item="蜂蜜檸檬紅茶">加入購物車</button>
            </div>
          </article>

          <article class="menu-item">
            <h3>伯爵鮮奶茶</h3>
            <p>伯爵茶、鮮奶、微糖</p>
            <div class="item-footer">
              <strong>NT$ 65</strong>
              <button type="button" data-item="伯爵鮮奶茶">加入購物車</button>
            </div>
          </article>

          <article class="menu-item">
            <h3>起司雞蛋吐司</h3>
            <p>厚片吐司、起司、煎蛋</p>
            <div class="item-footer">
              <strong>NT$ 50</strong>
              <button type="button" data-item="起司雞蛋吐司">加入購物車</button>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <p>校園外送練習專案</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
